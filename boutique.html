<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Damien - Nos Catégories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f8f9fa;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 2.5rem;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .categorie {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .categorie:hover {
            transform: translateY(-10px);
        }

        .categorie img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .categorie h2 {
            margin: 15px 0 10px;
            color: #333;
        }

        .categorie p {
            margin-bottom: 20px;
            padding: 0 15px;
        }

        .btn-bleu {
            padding: 14px 35px;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #ff6b6b, #ff4757);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-bleu:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }

        footer {
            background: #2c3e50;
            color: white;
            padding: 2.5rem 1rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Nos Catégories</h1>
    </header>

    <main>
        <div class="cards">

            <!-- Téléphones -->
            <div class="categorie">
                <img src="produits 9.jpeg" alt="Téléphones">
                <h2>Téléphones</h2>
                <p>Découvrez nos smartphones dernier cri.</p>
                <a href="telephone.html">
                    <button class="btn-bleu">Voir les téléphones</button>
                </a>
            </div>

            <!-- Ordinateurs -->
            <div class="categorie">
                <img src="produits 7.jpg" alt="Ordinateurs">
                <h2>Ordinateurs</h2>
                <p>Découvrez nos ordinateurs performants.</p>
                <a href="ordinateur.html">
                    <button class="btn-bleu">Voir les ordinateurs</button>
                </a>
            </div>

            <!-- Accessoires -->
            <div class="categorie">
                <img src="produits 2.jpeg" alt="Accessoires">
                <h2>Accessoires</h2>
                <p>Découvrez nos accessoires de qualité.</p>
                <a href="accessoires.html">
                    <button class="btn-bleu">Voir les accessoires</button>
                </a>
            </div>

        </div>
    </main>

    <footer>
        <p>&copy; 2026 Damien Shopping - Tous droits réservés</p>
        <p>Développé par <strong>bossdamien77-coder</strong></p>
    </footer>

</body>
</html>
