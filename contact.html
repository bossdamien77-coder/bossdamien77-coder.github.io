<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - Damien Shopping</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f8f9fa;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    padding:25px;
}

.container{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    background:#ff4757;
    color:white;
    border:none;
    padding:14px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

footer{
    margin-top:40px;
    background:#2c3e50;
    color:white;
    padding:20px;
}

</style>
</head>

<body>

<header>
    <h1>Contact Damien Shopping</h1>
</header>

<div class="container">

    <h2>Envoyez-nous un message</h2>

    <form action="https://formsubmit.co/damienboss77@gmail.com" method="POST">

        <input type="text" name="name" placeholder="Votre nom" required>

        <input type="email" name="email" placeholder="Votre email" required>

        <textarea name="message" rows="6" placeholder="Votre message" required></textarea>

        <button type="submit">Envoyer</button>

    </form>

</div>

<footer>
    <p>&copy; 2026 Damien Shopping</p>
</footer>

</body>
</html>
